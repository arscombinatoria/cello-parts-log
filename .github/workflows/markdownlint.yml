name: markdownlint (changed files)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Collect changed Markdown files
        id: changed
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          files="$(git diff --name-only "origin/$BASE_REF...HEAD" -- '*.md' '*.mdx' | tr '\n' ' ')"
          if [ -z "$files" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "any=true" >> "$GITHUB_OUTPUT"
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: markdownlint
        if: steps.changed.outputs.any == 'true'
        uses: reviewdog/action-markdownlint@6f0e0e8703a9e840ffefa37a2775832c51c1c640 # v0.28.0
        with:
          reporter: github-pr-review
          filter_mode: file
          level: error
          fail_level: any
          markdownlint_flags: ". --disable MD013 MD033"
