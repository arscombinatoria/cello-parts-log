name: markdownlint

on:
  pull_request:
    branches: ["main"]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get changed Markdown files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.md
            **/*.mdx

      - name: Normalize changed Markdown file list
        id: markdown_files
        run: |
          files='${{ steps.changed.outputs.all_changed_files }}'
          if [ -z "$files" ]; then
            files='${{ steps.changed.outputs.files }}'
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Run markdownlint with reviewdog
        if: steps.markdown_files.outputs.files != ''
        uses: reviewdog/action-markdownlint@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          fail_level: warning
          markdownlint_flags: -c .markdownlint.json ${{ steps.markdown_files.outputs.files }}
