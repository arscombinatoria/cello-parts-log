name: markdownlint (changed files)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Collect changed Markdown files
        id: changed
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}"
          files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- '*.md' '*.mdx' | tr '\n' ' ')"
          if [ -z "$files" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "any=true" >> "$GITHUB_OUTPUT"
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: markdownlint
        if: steps.changed.outputs.any == 'true'
        uses: reviewdog/action-markdownlint@3667398db9118d7e78f7a63d10e26ce454ba5f58 # v0.26.2
        with:
          reporter: github-pr-review
          filter_mode: file
          level: error
          fail_level: any
          markdownlint_flags: ". --disable MD013 MD033"
