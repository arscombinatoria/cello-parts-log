name: ci

on:
  pull_request:
    branches: ["main"]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Cache rspack build cache
        uses: actions/cache@v5
        with:
          path: |
            .cache/rspack
            node_modules/.cache/rspack
          key: ${{ runner.os }}-rspack-${{ matrix.node-version }}-${{ hashFiles('package-lock.json', 'docusaurus.config.js') }}
          restore-keys: |
            ${{ runner.os }}-rspack-${{ matrix.node-version }}-
      - name: Install dependencies
        run: npm ci
      - name: Print docs tree and content
        run: npm run print:docs
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
